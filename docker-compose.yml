services:
  # Container do Laravel (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - mangas_shared_data:/var/www/storage/app/public
    networks:
      - laravel-network

  # Container do Servidor Web (Nginx)
  webserver:
    image: nginx:alpine
    container_name: laravel-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - mangas_shared_data:/var/www/storage/app/public:ro
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
    mangas_shared_data:
        external: true
